{% extends "airflow/main.html" %}

{% block head_css %}
{{ super() }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #4361ee;
    --primary-hover: #3a56d4;
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
  }

  body {
    background-color: var(--bg-color) !important;
    font-family: 'Inter', sans-serif !important;
    color: var(--text-main) !important;
  }

  .preview-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    background: var(--card-bg);
    padding: 20px 24px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    border: 1px solid rgba(255,255,255,0.8);
  }

  .title-area h2 {
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--text-main);
    margin: 0 0 6px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .title-area p {
    color: var(--text-muted);
    margin: 0;
    font-size: 0.95rem;
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    color: var(--text-main);
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  }
  .btn-back:hover {
    background: #f1f5f9;
    color: var(--primary);
    border-color: #cbd5e1;
    text-decoration: none;
  }

  /* JSON plain-text card */
  .custom-card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(255,255,255,0.8);
    overflow: hidden;
  }

  .json-block {
    margin: 0;
    padding: 24px;
    font-family: 'SFMono-Regular', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text-main);
    background: #fafbfc;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-x: auto;
    max-height: 75vh;
    overflow-y: auto;
  }
</style>
{% endblock %}

{% block content %}
<div class="preview-container">

  <div class="page-header">
    <div class="title-area">
      <h2>
        <svg width="24" height="24" fill="none" stroke="var(--primary)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
        Preview: {{ filename }}
      </h2>
      <p>JSON file — plain text preview</p>
    </div>
    <a href="{{ url_for('UploadsView.list_files') }}" class="btn-back">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Uploads
    </a>
  </div>

  <div class="custom-card">
    <pre class="json-block">{{ json_text }}</pre>
  </div>

</div>
{% endblock %}
