{% extends "airflow/main.html" %}

{% block content %}
<style>
  .json-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .json-container {
    position: relative;
    overflow: auto;
    max-height: 600px;
    background: #f5f5f5;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 16px;
  }
  .json-container pre {
    margin: 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 0.9rem;
  }
  .json-container textarea {
    width: 100%;
    min-height: 500px;
    font-family: monospace;
    font-size: 0.9rem;
    border: none;
    background: transparent;
    outline: none;
    resize: vertical;
  }
  .json-container.editing {
    background: #fffef5;
    border-color: #ffc107;
  }
</style>

<div style="margin-bottom: 15px;">
  <a href="{{ url_for('UploadsView.list_files') }}" class="btn btn-secondary btn-sm">&larr; Back to Uploads</a>
</div>

<h2>Preview: {{ filename }}</h2>
<p class="text-muted">JSON content (plain text)</p>

<div class="json-toolbar">
  <button id="edit-btn" class="btn btn-warning btn-sm" onclick="toggleEdit()">✏️ Edit</button>
  <button id="cancel-btn" class="btn btn-secondary btn-sm" style="display:none;" onclick="cancelEdit()">Cancel</button>
</div>

<!-- Read-only view -->
<div id="view-mode" class="json-container">
  <pre>{{ content }}</pre>
</div>

<!-- Edit form (hidden by default) -->
<form id="edit-mode" style="display:none;"
      action="{{ url_for('UploadsView.save_json', filename=filename) }}"
      method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  <div class="json-container editing">
    <textarea name="content" id="json-editor">{{ content }}</textarea>
  </div>
  <div style="margin-top: 12px; display: flex; gap: 10px;">
    <button type="submit" class="btn btn-success btn-sm">💾 Save</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="formatJson()">🔧 Format</button>
    <button type="button" class="btn btn-secondary btn-sm" onclick="cancelEdit()">Cancel</button>
  </div>
</form>

<script>
var originalContent = document.getElementById('json-editor').value;

function toggleEdit() {
  document.getElementById('view-mode').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'block';
  document.getElementById('edit-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'inline-block';
  document.getElementById('json-editor').focus();
}

function cancelEdit() {
  document.getElementById('json-editor').value = originalContent;
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('view-mode').style.display = 'block';
  document.getElementById('edit-btn').style.display = 'inline-block';
  document.getElementById('cancel-btn').style.display = 'none';
}

function formatJson() {
  var editor = document.getElementById('json-editor');
  try {
    var data = JSON.parse(editor.value);
    editor.value = JSON.stringify(data, null, 2);
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
  }
}
</script>
{% endblock %}
